<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS101 Scoreboard</title>
     <link rel="stylesheet" href="score_board.css">
</head>
<body>

    <div class="container">
        <!-- Home Section -->
        <div class="score-card">
            <h3>HOME</h3>
            <div id="home-score" class="score-display">0</div>
            <div class="btn-group">
                <button id="home-add-1" class="score-btn">+1</button>
                <button id="home-add-2" class="score-btn">+2</button>
                <button id="home-add-3" class="score-btn">+3</button>
            </div>
        </div>

        <!-- Guest Section -->
        <div class="score-card">
            <h3>GUEST</h3>
            <div id="guest-score" class="score-display guest-score">0</div>
            <div class="btn-group">
                <button id="guest-add-1" class="geust-score-btn">+1</button>
                <button id="guest-add-2" class="geust-score-btn">+2</button>
                <button id="guest-add-3" class="geust-score-btn">+3</button>
            </div>
        </div>

        <!-- Reset Section -->
        <div class="reset-container">
            <button id="reset-btn" class="reset-btn">New Game</button>
        </div>
    </div>

    <!-- YOUR LOGIC GOES HERE -->
    <script src="score_board.js"></script>
</body>
</html>
